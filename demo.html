<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K.Mate — TOPIK AI Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', 'Noto Sans Myanmar', 'Pyidaungsu', 'Padauk', 'Segoe UI', Arial, sans-serif;
    background: #0f0f1a;
    color: #cdd6f4;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---- Header ---- */
  .header {
    background: #1e1e2e;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #313244;
  }
  .logo { font-size: 22px; font-weight: bold; color: #cba6f7; }
  .logo span { color: #89b4fa; }
  .user-info { font-size: 14px; color: #a6adc8; display: flex; gap: 12px; align-items: center; }
  .logout-btn {
    background: #f38ba8;
    color: #1e1e2e;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 13px;
  }

  /* ---- Auth Screen ---- */
  #auth-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .auth-box {
    background: #1e1e2e;
    border: 1px solid #313244;
    border-radius: 16px;
    padding: 40px;
    width: 400px;
  }
  .auth-box h2 { color: #cba6f7; margin-bottom: 24px; font-size: 24px; }
  .tab-row { display: flex; gap: 8px; margin-bottom: 24px; }
  .tab {
    flex: 1; padding: 10px; border: 1px solid #313244;
    background: transparent; color: #a6adc8;
    border-radius: 8px; cursor: pointer; font-size: 14px;
  }
  .tab.active { background: #313244; color: #cba6f7; border-color: #cba6f7; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: #a6adc8; }
  .form-group input {
    width: 100%; padding: 10px 14px;
    background: #313244; border: 1px solid #45475a;
    border-radius: 8px; color: #cdd6f4; font-size: 14px;
    outline: none;
  }
  .form-group input:focus { border-color: #89b4fa; }
  .auth-btn {
    width: 100%; padding: 12px;
    background: #cba6f7; color: #1e1e2e;
    border: none; border-radius: 8px;
    font-size: 15px; font-weight: bold; cursor: pointer;
    margin-top: 8px;
  }
  .auth-btn:hover { background: #b4befe; }
  .auth-msg { margin-top: 12px; font-size: 13px; text-align: center; min-height: 20px; }
  .auth-msg.error { color: #f38ba8; }
  .auth-msg.success { color: #a6e3a1; }

  /* ---- Chat Screen ---- */
  #chat-screen { flex: 1; display: none; flex-direction: column; }

  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: #6c7086;
  }
  .welcome h3 { font-size: 28px; color: #cba6f7; margin-bottom: 8px; }
  .welcome p { font-size: 15px; }

  .msg { display: flex; gap: 12px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .msg.user .avatar { background: #89b4fa; }
  .msg.bot  .avatar { background: #cba6f7; }

  .bubble {
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.7;
    white-space: pre-wrap;
  }
  .msg.user .bubble {
    background: #89b4fa;
    color: #1e1e2e;
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: #1e1e2e;
    border: 1px solid #313244;
    color: #cdd6f4;
    border-bottom-left-radius: 4px;
  }

  .typing { color: #6c7086; font-style: italic; font-size: 14px; }

  /* ---- Input Area ---- */
  .input-area {
    background: #1e1e2e;
    border-top: 1px solid #313244;
    padding: 16px 24px;
  }

  /* Quick questions */
  .quick-btns {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .quick-btn {
    background: #313244; color: #89b4fa;
    border: 1px solid #45475a;
    padding: 6px 12px; border-radius: 20px;
    cursor: pointer; font-size: 12px;
  }
  .quick-btn:hover { background: #45475a; }

  .input-row { display: flex; gap: 10px; }
  #question-input {
    flex: 1; padding: 12px 16px;
    background: #313244; border: 1px solid #45475a;
    border-radius: 12px; color: #cdd6f4;
    font-size: 15px; outline: none; resize: none;
    font-family: inherit;
  }
  #question-input:focus { border-color: #89b4fa; }
  .send-btn {
    background: #cba6f7; color: #1e1e2e;
    border: none; border-radius: 12px;
    padding: 12px 20px; cursor: pointer;
    font-size: 20px; font-weight: bold;
  }
  .send-btn:hover { background: #b4befe; }
  .send-btn:disabled { background: #45475a; cursor: not-allowed; }

  /* ---- Quiz Modal ---- */
  .quiz-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 100;
    align-items: center; justify-content: center;
  }
  .quiz-overlay.active { display: flex; }
  .quiz-box {
    background: #1e1e2e; border: 1px solid #313244;
    border-radius: 20px; padding: 32px; width: 560px;
    max-width: 95vw; max-height: 90vh; overflow-y: auto;
  }
  .quiz-box h2 { color: #cba6f7; margin-bottom: 20px; font-size: 22px; }

  .quiz-topic-row, .quiz-count-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .quiz-opt-btn {
    flex: 1; padding: 10px 16px; border: 2px solid #313244;
    background: transparent; color: #a6adc8;
    border-radius: 10px; cursor: pointer; font-size: 14px; min-width: 100px;
  }
  .quiz-opt-btn.selected { border-color: #cba6f7; background: #313244; color: #cba6f7; font-weight: bold; }

  .quiz-start-btn {
    width: 100%; padding: 14px; background: #cba6f7;
    color: #1e1e2e; border: none; border-radius: 10px;
    font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px;
  }
  .quiz-start-btn:hover { background: #b4befe; }
  .quiz-start-btn:disabled { background: #45475a; cursor: not-allowed; }

  /* Question area */
  .quiz-progress { color: #6c7086; font-size: 13px; margin-bottom: 12px; }
  .quiz-progress-bar {
    height: 4px; background: #313244; border-radius: 4px; margin-bottom: 20px;
  }
  .quiz-progress-fill { height: 100%; background: #cba6f7; border-radius: 4px; transition: width 0.3s; }
  .quiz-q-text {
    font-size: 17px; color: #cdd6f4; margin-bottom: 20px;
    line-height: 1.7; background: #181825; padding: 16px;
    border-radius: 10px; border-left: 3px solid #89b4fa;
  }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-choice {
    padding: 12px 16px; border: 2px solid #313244;
    background: #181825; color: #cdd6f4;
    border-radius: 10px; cursor: pointer; font-size: 15px;
    text-align: left; transition: all 0.2s;
  }
  .quiz-choice:hover { border-color: #89b4fa; background: #1e1e2e; }
  .quiz-choice.chosen { border-color: #cba6f7; background: #313244; color: #cba6f7; font-weight: bold; }

  .quiz-nav { display: flex; gap: 10px; margin-top: 20px; }
  .quiz-next-btn {
    flex: 1; padding: 12px; background: #89b4fa; color: #1e1e2e;
    border: none; border-radius: 10px; font-size: 15px;
    font-weight: bold; cursor: pointer;
  }
  .quiz-next-btn:disabled { background: #45475a; cursor: not-allowed; }
  .quiz-submit-btn {
    flex: 1; padding: 12px; background: #a6e3a1; color: #1e1e2e;
    border: none; border-radius: 10px; font-size: 15px;
    font-weight: bold; cursor: pointer;
  }

  /* Results */
  .quiz-score-card {
    text-align: center; padding: 24px;
    background: #181825; border-radius: 12px; margin-bottom: 20px;
  }
  .quiz-score-num { font-size: 48px; font-weight: bold; color: #cba6f7; }
  .quiz-score-label { color: #a6adc8; font-size: 15px; margin-top: 4px; }
  .quiz-explanation {
    background: #181825; border-radius: 10px; padding: 16px;
    color: #cdd6f4; font-size: 14px; line-height: 1.8;
    white-space: pre-wrap; margin-bottom: 20px;
  }
  .quiz-result-btns { display: flex; gap: 10px; }
  .quiz-retry-btn {
    flex: 1; padding: 12px; background: #cba6f7; color: #1e1e2e;
    border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer;
  }
  .quiz-close-btn {
    flex: 1; padding: 12px; background: #313244; color: #cdd6f4;
    border: none; border-radius: 10px; font-size: 15px; cursor: pointer;
  }
  .quiz-lang-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .quiz-section-label { color: #a6adc8; font-size: 13px; margin-bottom: 8px; }
</style>
</head>
<body>

<!-- QUIZ MODAL -->
<div class="quiz-overlay" id="quiz-overlay">
  <div class="quiz-box">

    <!-- Step 1: Settings -->
    <div id="quiz-settings">
      <h2>📋 TOPIK II Practice Quiz</h2>

      <div class="quiz-section-label">Choose Topic:</div>
      <div class="quiz-topic-row">
        <button class="quiz-opt-btn selected" onclick="selectTopic(this,'grammar')">📝 Grammar</button>
        <button class="quiz-opt-btn" onclick="selectTopic(this,'vocabulary')">📖 Vocabulary</button>
        <button class="quiz-opt-btn" onclick="selectTopic(this,'mixed')">🎯 Mixed</button>
      </div>

      <div class="quiz-section-label">Number of Questions:</div>
      <div class="quiz-count-row">
        <button class="quiz-opt-btn selected" onclick="selectCount(this,5)">5 Questions</button>
        <button class="quiz-opt-btn" onclick="selectCount(this,10)">10 Questions</button>
      </div>

      <div class="quiz-section-label">Explanation Language:</div>
      <div class="quiz-lang-row">
        <button class="quiz-opt-btn selected" onclick="selectLang(this,'English')">🇬🇧 English</button>
        <button class="quiz-opt-btn" onclick="selectLang(this,'Korean')">🇰🇷 Korean</button>
        <button class="quiz-opt-btn" onclick="selectLang(this,'Burmese')">🇲🇲 Burmese</button>
      </div>

      <button class="quiz-start-btn" id="quiz-start-btn" onclick="startQuiz()">🚀 Start Quiz</button>
      <button class="quiz-close-btn" style="width:100%;margin-top:10px" onclick="closeQuiz()">✕ Cancel</button>
    </div>

    <!-- Step 2: Questions -->
    <div id="quiz-questions" style="display:none">
      <div class="quiz-progress" id="quiz-progress-text">Question 1 / 5</div>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-progress-fill" style="width:0%"></div></div>
      <div class="quiz-q-text" id="quiz-q-text"></div>
      <div class="quiz-options" id="quiz-options"></div>
      <div class="quiz-nav">
        <button class="quiz-next-btn" id="quiz-next-btn" onclick="nextQuestion()" disabled>Next →</button>
      </div>
    </div>

    <!-- Step 3: Results -->
    <div id="quiz-results" style="display:none">
      <div class="quiz-score-card">
        <div class="quiz-score-num" id="quiz-score-num">0/5</div>
        <div class="quiz-score-label" id="quiz-score-label">Keep practicing! 💪</div>
      </div>
      <div class="quiz-explanation" id="quiz-explanation"></div>
      <div class="quiz-result-btns">
        <button class="quiz-retry-btn" onclick="retryQuiz()">🔄 Try Again</button>
        <button class="quiz-close-btn" onclick="closeQuiz()">💬 Back to Chat</button>
      </div>
    </div>

  </div>
</div>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <h2>🎓 K.Mate</h2>
    <div class="tab-row">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••">
      </div>
      <button class="auth-btn" onclick="login()">Login</button>
      <div class="auth-msg" id="login-msg"></div>
    </div>

    <!-- Register Form -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="reg-name" placeholder="Your name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="••••••">
      </div>
      <button class="auth-btn" onclick="register()">Register</button>
      <div class="auth-msg" id="reg-msg"></div>
    </div>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">
  <div class="header">
    <div class="logo">K.<span>Mate</span> — TOPIK AI Tutor</div>
    <div class="user-info">
      <span id="username-display"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="chat-container" id="chat-container">
    <div class="welcome">
      <h3>👋 K.Mate에 오신 것을 환영합니다!</h3>
      <p>TOPIK II 시험 준비를 도와드릴게요.<br>English, 한국어, မြန်မာ — any language!</p>
    </div>
  </div>

  <div class="input-area">
    <div class="quick-btns">
      <button class="quick-btn" onclick="quickAsk('책을 많이 ( ) 지식을 쌓을 수 있다 - what is the answer?')">📝 Grammar Q1</button>
      <button class="quick-btn" onclick="quickAsk('이 동네로 이사를 ( ) 일 년이 됐다 - explain the answer')">📝 Grammar Q2</button>
      <button class="quick-btn" onclick="quickAsk('what does 가성비 mean?')">📖 Vocabulary</button>
      <button class="quick-btn" onclick="quickAsk('what sections are in TOPIK II?')">ℹ️ TOPIK Info</button>
      <button class="quick-btn" onclick="quickAsk('explain 만큼 grammar in burmese')">🇲🇲 Burmese</button>
      <button class="quick-btn" style="background:#313244;color:#a6e3a1;border-color:#a6e3a1" onclick="openQuiz()">📋 Practice Quiz</button>
    </div>
    <div class="input-row">
      <textarea id="question-input" rows="1" placeholder="Ask K.Mate anything about TOPIK..."></textarea>
      <button class="send-btn" id="send-btn" onclick="sendQuestion()">➤</button>
    </div>
  </div>
</div>

<script>
const API = "http://localhost:3000/api";
let token = localStorage.getItem("kmate_token");
let userName = localStorage.getItem("kmate_name");

// Auto-login if token exists
if (token) showChat();

function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
  document.getElementById("login-form").style.display    = tab === "login"    ? "block" : "none";
  document.getElementById("register-form").style.display = tab === "register" ? "block" : "none";
}

async function login() {
  const email    = document.getElementById("login-email").value;
  const password = document.getElementById("login-password").value;
  const msg      = document.getElementById("login-msg");
  msg.className  = "auth-msg";
  msg.textContent = "Logging in...";

  try {
    const res  = await fetch(`${API}/auth/login`, {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { msg.className = "auth-msg error"; msg.textContent = data.message; return; }

    token    = data.token;
    userName = data.user.name;
    localStorage.setItem("kmate_token", token);
    localStorage.setItem("kmate_name", userName);
    msg.className = "auth-msg success";
    msg.textContent = "✅ Login successful!";
    setTimeout(showChat, 500);
  } catch { msg.className = "auth-msg error"; msg.textContent = "Connection error"; }
}

async function register() {
  const name     = document.getElementById("reg-name").value;
  const email    = document.getElementById("reg-email").value;
  const password = document.getElementById("reg-password").value;
  const msg      = document.getElementById("reg-msg");
  msg.className  = "auth-msg";
  msg.textContent = "Registering...";

  try {
    const res  = await fetch(`${API}/auth/register`, {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (!res.ok) { msg.className = "auth-msg error"; msg.textContent = data.message; return; }
    msg.className = "auth-msg success";
    msg.textContent = "✅ Registered! Please login.";
    setTimeout(() => switchTab("login"), 1000);
  } catch { msg.className = "auth-msg error"; msg.textContent = "Connection error"; }
}

function showChat() {
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("chat-screen").style.display = "flex";
  document.getElementById("username-display").textContent = "👤 " + (userName || "User");
}

function logout() {
  localStorage.removeItem("kmate_token");
  localStorage.removeItem("kmate_name");
  token = null;
  document.getElementById("auth-screen").style.display = "flex";
  document.getElementById("chat-screen").style.display = "none";
}

function quickAsk(q) {
  document.getElementById("question-input").value = q;
  sendQuestion();
}

function addMsg(role, text) {
  const container = document.getElementById("chat-container");
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="avatar">${role === "user" ? "🧑" : "🤖"}</div>
    <div class="bubble">${text}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

async function sendQuestion() {
  const input = document.getElementById("question-input");
  const btn   = document.getElementById("send-btn");
  const q     = input.value.trim();
  if (!q || btn.disabled) return;

  input.value = "";
  btn.disabled = true;
  addMsg("user", q);
  const typingDiv = addMsg("bot", '<span class="typing">K.Mate is thinking...</span>');

  try {
    const res  = await fetch(`${API}/kmate/ask`, {
      method: "POST",
      headers: {"Content-Type":"application/json", "Authorization":"Bearer " + token},
      body: JSON.stringify({ question: q })
    });
    const data = await res.json();
    typingDiv.querySelector(".bubble").innerHTML = formatAnswer(data.answer || data.message || "No answer");
  } catch {
    typingDiv.querySelector(".bubble").textContent = "❌ Connection error. Is the server running?";
  }

  btn.disabled = false;
  input.focus();
}

// ===================== QUIZ LOGIC =====================
let quizTopic = "grammar";
let quizCount = 5;
let quizLang  = "English";
let quizQuestions = [];
let quizAnswers   = [];
let quizCurrent   = 0;

function openQuiz() {
  document.getElementById("quiz-overlay").classList.add("active");
  showStep("settings");
}
function closeQuiz() {
  document.getElementById("quiz-overlay").classList.remove("active");
  quizQuestions = []; quizAnswers = []; quizCurrent = 0;
  showStep("settings");
}

function showStep(step) {
  ["quiz-settings","quiz-questions","quiz-results"].forEach(id => {
    document.getElementById(id).style.display = "none";
  });
  document.getElementById("quiz-" + step).style.display = "block";
}

function selectTopic(btn, val) {
  document.querySelectorAll(".quiz-topic-row .quiz-opt-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected"); quizTopic = val;
}
function selectCount(btn, val) {
  document.querySelectorAll(".quiz-count-row .quiz-opt-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected"); quizCount = val;
}
function selectLang(btn, val) {
  document.querySelectorAll(".quiz-lang-row .quiz-opt-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected"); quizLang = val;
}

async function startQuiz() {
  const btn = document.getElementById("quiz-start-btn");
  btn.disabled = true; btn.textContent = "⏳ Generating questions...";
  try {
    const res  = await fetch(`${API}/kmate/quiz/generate`, {
      method: "POST",
      headers: {"Content-Type":"application/json","Authorization":"Bearer "+token},
      body: JSON.stringify({ topic: quizTopic, count: quizCount })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    quizQuestions = data.questions;
    quizAnswers   = new Array(quizQuestions.length).fill(0);
    quizCurrent   = 0;
    showStep("questions");
    renderQuestion();
  } catch(e) {
    alert("❌ Error: " + e.message);
  }
  btn.disabled = false; btn.textContent = "🚀 Start Quiz";
}

function renderQuestion() {
  const q   = quizQuestions[quizCurrent];
  const num = quizCurrent + 1;
  const tot = quizQuestions.length;

  document.getElementById("quiz-progress-text").textContent = `Question ${num} / ${tot}`;
  document.getElementById("quiz-progress-fill").style.width = `${(num/tot)*100}%`;
  document.getElementById("quiz-q-text").textContent = q.q;

  const optsDiv = document.getElementById("quiz-options");
  optsDiv.innerHTML = "";
  const symbols = ["①","②","③","④"];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "quiz-choice";
    if (quizAnswers[quizCurrent] === i+1) btn.classList.add("chosen");
    btn.textContent = `${symbols[i]} ${opt}`;
    btn.onclick = () => chooseAnswer(i+1);
    optsDiv.appendChild(btn);
  });

  const nextBtn = document.getElementById("quiz-next-btn");
  nextBtn.disabled = (quizAnswers[quizCurrent] === 0);
  if (quizCurrent === quizQuestions.length - 1) {
    nextBtn.textContent = "✅ Submit Quiz";
    nextBtn.onclick = submitQuiz;
  } else {
    nextBtn.textContent = "Next →";
    nextBtn.onclick = nextQuestion;
  }
}

function chooseAnswer(idx) {
  quizAnswers[quizCurrent] = idx;
  document.querySelectorAll(".quiz-choice").forEach((b,i) => {
    b.classList.toggle("chosen", i+1 === idx);
  });
  document.getElementById("quiz-next-btn").disabled = false;
}

function nextQuestion() {
  if (quizCurrent < quizQuestions.length - 1) {
    quizCurrent++;
    renderQuestion();
  }
}

async function submitQuiz() {
  const nextBtn = document.getElementById("quiz-next-btn");
  nextBtn.disabled = true; nextBtn.textContent = "⏳ Checking answers...";
  try {
    const res  = await fetch(`${API}/kmate/quiz/check`, {
      method: "POST",
      headers: {"Content-Type":"application/json","Authorization":"Bearer "+token},
      body: JSON.stringify({ questions: quizQuestions, answers: quizAnswers, language: quizLang })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    showResults(data);
  } catch(e) {
    alert("❌ Error: " + e.message);
    nextBtn.disabled = false; nextBtn.textContent = "✅ Submit Quiz";
  }
}

function showResults(data) {
  const pct = Math.round((data.score / data.total) * 100);
  let emoji = pct >= 80 ? "🎉 Excellent!" : pct >= 60 ? "👍 Good job!" : pct >= 40 ? "📚 Keep studying!" : "💪 Don't give up!";
  document.getElementById("quiz-score-num").textContent = `${data.score} / ${data.total}`;
  document.getElementById("quiz-score-label").textContent = `${pct}% — ${emoji}`;
  document.getElementById("quiz-explanation").innerHTML = formatAnswer(data.explanation);
  showStep("results");
}

function retryQuiz() {
  quizQuestions = []; quizAnswers = []; quizCurrent = 0;
  showStep("settings");
}
// ===================== END QUIZ =====================

function formatAnswer(text) {
  // Remove any raw HTML tags for safety
  text = text.replace(/<[^>]*>/g, "");
  // Bold: **text**
  text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
  // Italic: *text*
  text = text.replace(/\*([^*]+)\*/g, "<em>$1</em>");
  // Numbered list: lines starting with "1. " "2. " etc
  text = text.replace(/^(\d+)\.\s(.+)$/gm, "<b>$1.</b> $2");
  // Bullet list: lines starting with "- " or "• "
  text = text.replace(/^[-•]\s(.+)$/gm, "• $1");
  // Line breaks
  text = text.replace(/\n/g, "<br>");
  return text;
}

// Enter key to send (Shift+Enter for newline)
document.addEventListener("DOMContentLoaded", () => {
  const input = document.getElementById("question-input");
  if (input) {
    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
    });
  }
});
</script>
